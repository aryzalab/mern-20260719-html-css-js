<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Styling</title>
    <style>
      /* Internal styles  */
      h1 {
        color: red;
        background-color: #ff000055;
      }

      #title {
        color: darkmagenta;
      }

      .title {
        color: blue;
      }

      h1 {
        color: green;
      }

      .para {
        color: teal;
      }

      .para2 {
        color: darksalmon;
      }
    </style>

    <link rel="stylesheet" href="mystyles.css" />
  </head>
  <body>
    <h1 id="title" class="title" style="color: teal">Hello world</h1>

    <div class="para">
      <p>para1</p>
      <p class="para2">para2</p>
    </div>

    <h2 style="color: blue; font-size: 3rem">Its fun to learn css</h2>

    <h3>Hello from external css</h3>
    <hr />
    <!-- Color properties -->

    <h2 class="heading-1">Color properties</h2>
    <h2 class="heading-2">Color properties</h2>
    <h2 class="heading-3">Color properties</h2>
  </body>
</html>
